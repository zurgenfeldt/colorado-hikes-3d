<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Colorado Hikes — 3D flythrough</title>
<meta name="description" content="Interactive 3D flythroughs of Colorado hiking routes with satellite terrain, elevation, and trail markers."/>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
	  *{box-sizing:border-box}
	  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
	    background:linear-gradient(180deg,#9cc0e2 0%,#bcd6ea 45%,#dde9f3 70%,#eef4f9 100%)}
	  #map{position:absolute;inset:0;background:transparent}
	  #gameWorld{position:absolute;inset:0;z-index:4;display:none;background:#9fb8cd}
	  body.game #gameWorld{display:block}
	  body.game::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background:
	    radial-gradient(ellipse at center,rgba(255,255,255,0) 45%,rgba(5,9,10,.36) 100%),
	    linear-gradient(180deg,rgba(255,244,218,.08),rgba(18,24,18,.18));mix-blend-mode:multiply}
	  body.game #map,body.game .maplibregl-control-container,body.game #worldShade,body.game .mk{display:none}
	  body.game #top,body.game #stats,body.game #hint{opacity:0;pointer-events:none}
	  .maplibregl-canvas{background:transparent}
	  #worldShade{position:absolute;inset:0;z-index:3;pointer-events:none;background:
	    radial-gradient(ellipse at center,rgba(0,0,0,0) 38%,rgba(0,0,0,.36) 100%),
	    linear-gradient(180deg,rgba(2,8,15,.34) 0%,rgba(2,8,15,0) 32%,rgba(2,8,15,.18) 100%);
	    opacity:.52;transition:opacity .5s ease}
	  #hero{position:absolute;z-index:8;inset:0;display:grid;place-items:center;padding:28px;color:#fff;text-align:center;pointer-events:none;
	    background:linear-gradient(180deg,rgba(3,8,13,.55),rgba(3,8,13,.08) 48%,rgba(3,8,13,.48));transition:opacity .45s ease,visibility .45s ease}
	  #hero .inner{max-width:min(760px,92vw);transform:translateY(-3vh);text-shadow:0 2px 18px rgba(0,0,0,.78)}
	  #hero .kicker{margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.86}
	  #hero h2{margin:0;font-size:clamp(38px,8vw,86px);line-height:.94;font-weight:750;letter-spacing:0}
	  #hero p{margin:16px auto 0;max-width:620px;font-size:clamp(15px,2.1vw,19px);line-height:1.45;color:rgba(255,255,255,.9)}
	  #heroStats{margin-top:16px;font-size:13px;color:rgba(255,255,255,.82)}
	  .hero-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px;pointer-events:auto}
	  .hero-btn{min-height:42px;padding:10px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.34);background:rgba(12,18,24,.66);
	    color:#fff;font-size:14px;font-weight:650;cursor:pointer;backdrop-filter:blur(8px)}
	  .hero-btn.primary{background:#ff5a2b;border-color:#ff7d55}
	  body:not(.exploring):not(.cinematic) #top,
	  body:not(.exploring):not(.cinematic) #ctl,
	  body:not(.exploring):not(.cinematic) #stats,
	  body:not(.exploring):not(.cinematic) #profile,
	  body:not(.exploring):not(.cinematic) #hint,
	  body:not(.exploring):not(.cinematic) .maplibregl-control-container{opacity:0;pointer-events:none}
	  body:not(.exploring):not(.cinematic) .mk .lab{display:none}
	  body.exploring #hero,body.cinematic #hero,body.game #hero{opacity:0;visibility:hidden}
	  body.cinematic #worldShade{opacity:.78}
	  body.cinematic #top,body.cinematic #stats,body.cinematic #hint{opacity:0;pointer-events:none}
	  .panel{position:absolute;z-index:5;color:#fff}
	  #top{top:max(12px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));max-width:min(92vw,440px)}
	  #top h1{margin:0 0 2px;font-size:17px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}
	  #top p{margin:0 0 8px;font-size:12px;opacity:.85;text-shadow:0 1px 4px rgba(0,0,0,.6)}
	  .tabs{display:flex;gap:6px;flex-wrap:wrap}
	  .tab{padding:6px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.28);background:rgba(18,22,28,.6);
	    backdrop-filter:blur(6px);color:#fff;font-size:13px;line-height:1.2;cursor:pointer}
	  .tab.on{background:#ff5a2b;border-color:#ff5a2b}
	  #ctl{bottom:max(14px,env(safe-area-inset-bottom));left:max(12px,env(safe-area-inset-left));display:flex;gap:6px;flex-wrap:wrap;align-items:center;max-width:min(760px,calc(100vw - 24px))}
	  .btn{padding:8px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.28);background:rgba(18,22,28,.62);
	    backdrop-filter:blur(6px);color:#fff;font-size:13px;line-height:1.2;cursor:pointer;display:inline-flex;gap:6px;align-items:center;min-height:34px}
	  .btn:hover{background:rgba(40,46,54,.8)}
	  .btn.on{background:#1d6fb8;border-color:#1d6fb8}
	  .tab:focus-visible,.btn:focus-visible,.hero-btn:focus-visible,.exa input:focus-visible{outline:2px solid #fff;outline-offset:2px}
	  .exa{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.28);
	    background:rgba(18,22,28,.62);backdrop-filter:blur(6px);font-size:12px}
	  .exa input{width:90px}
	  #stats{top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));text-align:right;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.7);min-width:120px}
	  #stats b{font-size:20px;font-weight:600}
	  .stats-meta{opacity:.85}
	  #profile{right:max(12px,env(safe-area-inset-right));bottom:calc(max(14px,env(safe-area-inset-bottom)) + 44px);
	    width:min(360px,calc(100vw - 24px));padding:9px 10px 8px;border:1px solid rgba(255,255,255,.24);
	    border-radius:8px;background:rgba(12,17,22,.64);backdrop-filter:blur(8px);box-shadow:0 8px 28px rgba(0,0,0,.22)}
	  #profile canvas{display:block;width:100%;height:104px}
	  #profileMeta{display:flex;justify-content:space-between;gap:10px;margin-top:5px;font-size:11px;color:rgba(255,255,255,.82);white-space:nowrap}
	  #profileMeta b{color:#fff;font-weight:650}
	  #bar{position:absolute;left:0;bottom:0;height:3px;background:#ff5a2b;width:0;z-index:7;transition:width .05s linear}
	  .mk{display:flex;flex-direction:column;align-items:center;pointer-events:none;transform:translateY(-50%)}
	  .mk .dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
	  .mk .lab{margin-top:3px;font-size:11px;color:#fff;background:rgba(12,16,20,.72);padding:2px 6px;border-radius:6px;
	    white-space:nowrap;text-shadow:none}
	  body.cinematic .mk .lab{opacity:.75}
	  #hint{bottom:max(14px,env(safe-area-inset-bottom));right:max(12px,env(safe-area-inset-right));font-size:11px;opacity:.8;text-shadow:0 1px 4px rgba(0,0,0,.7)}
	  @media (max-width:720px){
	    #hero{place-items:start center;padding:72px 18px 18px}
	    #hero .inner{transform:none}
	    #hero h2{font-size:42px}
	    #top{max-width:calc(100vw - 24px)}
	    #stats{top:auto;bottom:calc(max(14px,env(safe-area-inset-bottom)) + 104px);right:max(12px,env(safe-area-inset-right));background:rgba(18,22,28,.58);border-radius:8px;padding:6px 9px;backdrop-filter:blur(6px)}
	    #profile{left:max(12px,env(safe-area-inset-left));right:max(12px,env(safe-area-inset-right));bottom:calc(max(14px,env(safe-area-inset-bottom)) + 116px);width:auto;padding:8px}
	    #profile canvas{height:82px}
	    #ctl{right:max(12px,env(safe-area-inset-right))}
	    .btn,.tab{min-height:38px}
	    .exa{flex:1 1 210px;min-height:38px}
	    .exa input{flex:1;min-width:110px}
	    #hint{display:none}
	  }
	  @media (prefers-reduced-motion:reduce){
	    #bar{transition:none}
	  }
	</style>
</head>
<body>
<div id="map"></div>
<div id="gameWorld" aria-label="Procedural 3D trail world"></div>
<div id="worldShade" aria-hidden="true"></div>
<section id="hero" aria-labelledby="heroTitle">
  <div class="inner">
    <p class="kicker">real terrain · procedural detail · guided flight</p>
    <h2 id="heroTitle">Colorado Hikes 3D</h2>
    <p id="heroCopy">Satellite terrain, elevation-driven snowfields, alpine water, and generated forest texture around each route.</p>
    <div id="heroStats"></div>
    <div class="hero-actions">
      <button class="hero-btn primary" id="heroCine" type="button">Start cinematic tour</button>
      <button class="hero-btn" id="heroGame" type="button">3D game walk</button>
      <button class="hero-btn" id="heroExplore" type="button">Explore manually</button>
    </div>
  </div>
</section>
<div id="bar"></div>
<div class="panel" id="top">
  <h1 id="title">Colorado hikes — 3D</h1>
  <p id="sub"></p>
  <div class="tabs" id="tabs"></div>
</div>
<div class="panel" id="stats"></div>
<div class="panel" id="profile" aria-label="Distance and elevation profile">
  <canvas id="profileCanvas" width="680" height="208"></canvas>
  <div id="profileMeta"></div>
</div>
<div class="panel" id="ctl">
	  <button class="btn" id="play" type="button" aria-pressed="false">▶ Fly the trail</button>
	  <button class="btn" id="walk" type="button" aria-pressed="false">Map walk</button>
	  <button class="btn" id="game" type="button" aria-pressed="false">3D game walk</button>
	  <button class="btn" id="cine" type="button" aria-pressed="false">Cinematic tour</button>
	  <button class="btn" id="reset" type="button">Reset view</button>
	  <label class="exa" for="exa">relief ×<span id="exav">1.4</span><input type="range" id="exa" min="1" max="3" step="0.1" value="1.4" aria-label="Terrain relief exaggeration"/></label>
</div>
<div class="panel" id="hint">drag = rotate · right-drag/ctrl-drag = tilt · scroll = zoom</div>

    new maplibregl.LngLat(cLL[0],cLL[1]), camAlt,
    new maplibregl.LngLat(tLL[0],tLL[1]), tgtAlt));
}
function step(ts){
  if(!t0)t0=ts;
  let p=Math.min(1,(ts-t0)/dur), pe=easeIO(p);
  frameAt(pe);
  drawProfile(key,pe);
  document.getElementById('bar').style.width=(p*100)+'%';
  if(p<1&&flying){raf=requestAnimationFrame(step);} else {stopFly();}
}

function buildTabs(){
	  const t=document.getElementById('tabs');
	  t.textContent='';
	  Object.keys(HIKES).forEach(k=>{
	    const b=document.createElement('button');
	    b.className='tab';
	    b.type='button';
	    b.dataset.k=k;
	    b.textContent=HIKES[k].title;
	    b.setAttribute('aria-pressed','false');
	    b.onclick=()=>loadHike(k,true);
	    t.appendChild(b);
	  });
	}
document.getElementById('play').onclick=()=>{(flying&&mode==='fly')?stopFly():startFly('fly');};
document.getElementById('walk').onclick=()=>{(flying&&mode==='walk')?stopFly():startFly('walk');};
document.getElementById('game').onclick=()=>{(flying&&mode==='game')?stopFly():startFly('game');};
document.getElementById('cine').onclick=()=>{(flying&&mode==='cinema')?stopFly():startFly('cinema');};
document.getElementById('heroCine').onclick=()=>startFly('cinema');
document.getElementById('heroGame').onclick=()=>startFly('game');
document.getElementById('heroExplore').onclick=()=>document.body.classList.add('exploring');
document.getElementById('reset').onclick=()=>{stopFly();resetView();};
document.getElementById('exa').oninput=function(){document.getElementById('exav').textContent=(+this.value).toFixed(1);
  map.setTerrain({source:'dem',exaggeration:flying?Math.min(+this.value,1.0):+this.value});};
map.on('dragstart',()=>{if(flying)stopFly();});
</script>
