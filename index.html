<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Colorado Hikes — 3D flythrough</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#9cc0e2 0%,#bcd6ea 45%,#dde9f3 70%,#eef4f9 100%)}
  #map{position:absolute;inset:0;background:transparent}
  .maplibregl-canvas{background:transparent}
  .panel{position:absolute;z-index:5;color:#fff}
  #top{top:12px;left:12px;max-width:min(92vw,420px)}
  #top h1{margin:0 0 2px;font-size:17px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  #top p{margin:0 0 8px;font-size:12px;opacity:.85;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:6px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.28);background:rgba(18,22,28,.6);
    backdrop-filter:blur(6px);color:#fff;font-size:13px;cursor:pointer}
  .tab.on{background:#ff5a2b;border-color:#ff5a2b}
  #ctl{bottom:14px;left:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .btn{padding:8px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.28);background:rgba(18,22,28,.62);
    backdrop-filter:blur(6px);color:#fff;font-size:13px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .btn:hover{background:rgba(40,46,54,.8)}
  .btn.on{background:#1d6fb8;border-color:#1d6fb8}
  .exa{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.28);
    background:rgba(18,22,28,.62);backdrop-filter:blur(6px);font-size:12px}
  .exa input{width:90px}
  #stats{top:12px;right:12px;text-align:right;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.7);min-width:120px}
  #stats b{font-size:20px;font-weight:600}
  #bar{position:absolute;left:0;bottom:0;height:3px;background:#ff5a2b;width:0;z-index:6;transition:width .05s linear}
  .mk{display:flex;flex-direction:column;align-items:center;pointer-events:none;transform:translateY(-50%)}
  .mk .dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
  .mk .lab{margin-top:3px;font-size:11px;color:#fff;background:rgba(12,16,20,.72);padding:2px 6px;border-radius:6px;
    white-space:nowrap;text-shadow:none}
  #hint{bottom:14px;right:12px;font-size:11px;opacity:.8;text-shadow:0 1px 4px rgba(0,0,0,.7)}
</style>
</head>
<body>
<div id="map"></div>
<div id="bar"></div>
<div class="panel" id="top">
  <h1 id="title">Colorado hikes — 3D</h1>
  <p id="sub"></p>
  <div class="tabs" id="tabs"></div>
</div>
<div class="panel" id="stats"></div>
<div class="panel" id="ctl">

  <div class="exa">relief ×<span id="exav">1.4</span><input type="range" id="exa" min="1" max="3" step="0.1" value="1.4"/></div>
</div>
<div class="panel" id="hint">drag = rotate · right-drag/ctrl-drag = tilt · scroll = zoom</div>

let key='seg7', flying=false, mode='fly', raf=null, t0=0, dur=50000, markers=[];

function hav(a,b){const R=6371000,r=Math.PI/180;
  const dla=(b[1]-a[1])*r,dlo=(b[0]-a[0])*r,la1=a[1]*r,la2=b[1]*r;
  const h=Math.sin(dla/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dlo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));}
function bearing(a,b){const r=Math.PI/180;
  const y=Math.sin((b[0]-a[0])*r)*Math.cos(b[1]*r);
  const x=Math.cos(a[1]*r)*Math.sin(b[1]*r)-Math.sin(a[1]*r)*Math.cos(b[1]*r)*Math.cos((b[0]-a[0])*r);
  return Math.atan2(y,x)*180/Math.PI;}
function cum(co){let d=[0];for(let i=1;i<co.length;i++)d.push(d[i-1]+hav(co[i-1],co[i]));return d;}
function along(co,cd,p){const total=cd[cd.length-1],target=p*total;
  let i=1;while(i<cd.length&&cd[i]<target)i++;i=Math.min(i,co.length-1);
  const seg=cd[i]-cd[i-1]||1,t=(target-cd[i-1])/seg;
  return [co[i-1][0]+(co[i][0]-co[i-1][0])*t, co[i-1][1]+(co[i][1]-co[i-1][1])*t];}
const easeIO=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

function fc(k){return {type:'Feature',geometry:{type:'LineString',coordinates:HIKES[k].coords}};}
function clearMarkers(){markers.forEach(m=>m.remove());markers=[];}
function colorOf(t){return t==='flag'?'#37d67a':t==='flag-finish'?'#ffd23f':t==='peak'?'#ffffff':t==='lake'?'#2f9ee0':t==='droplet'?'#5bc0de':'#ff5a2b';}
function addMarkers(k){clearMarkers();
  HIKES[k].markers.forEach(m=>{
    const el=document.createElement('div');el.className='mk';
    el.innerHTML='<div class="dot" style="background:'+colorOf(m.i)+'"></div><div class="lab">'+m.n+'</div>';
    markers.push(new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([m.lon,m.lat]).addTo(map));
  });
}
function bounds(co){let b=new maplibregl.LngLatBounds(co[0],co[0]);co.forEach(c=>b.extend(c));return b;}

function loadHike(k,fit){
  key=k; stopFly();
  document.getElementById('title').textContent=HIKES[k].title;
  document.getElementById('sub').textContent=HIKES[k].sub;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.k===k));
  if(map.getSource('route'))map.getSource('route').setData(fc(k));
  addMarkers(k);
  renderStats(k);
  resetView();
}
function resetView(){
  stopFly();
  const co=HIKES[key].coords;
  map.fitBounds(bounds(co),{padding:70,duration:900,pitch:58,bearing:initBearing(co)});
}
function initBearing(co){return bearing(co[0],co[Math.min(co.length-1,Math.floor(co.length*0.6))]);}

function renderStats(k){
  const h=HIKES[k];let s='';
  if(h.stats){s='<div><b>'+h.stats.hi+'</b> ft high</div><div style="opacity:.85">'+h.stats.dist+' mi · '+h.stats.gain+' ft gain</div>';}
  document.getElementById('stats').innerHTML=s;
}

// ---- flythrough ----
let CO=[],CD=[],ELE=[];
function curExa(){return parseFloat(document.getElementById('exa').value);}
function setRoute(thin){
  if(!map.getLayer('route'))return;
  map.setPaintProperty('route','line-width',thin?3:4.5);
  map.setPaintProperty('route-cap','line-width',thin?5:8);
}
function setBtns(){
  document.getElementById('play').innerHTML=(flying&&mode==='fly')?'⏸ Pause':'▶ Fly the trail';
  document.getElementById('play').classList.toggle('on',flying&&mode==='fly');
  document.getElementById('walk').innerHTML=(flying&&mode==='walk')?'⏸ Pause':'Walk the trail';
  document.getElementById('walk').classList.toggle('on',flying&&mode==='walk');
}
function startFly(m){
  mode=m; CO=HIKES[key].coords;CD=cum(CO);ELE=HIKES[key].ele||[];
  const len=CD[CD.length-1];
  dur=Math.max(24000,Math.min(m==='walk'?150000:80000,len/1609*(m==='walk'?9000:5200)));
  map.setTerrain({source:'dem',exaggeration:Math.min(curExa(),1.0)}); // keep camera above the terrain while following
  setRoute(m==='walk');
  flying=true;t0=0;setBtns();
  raf=requestAnimationFrame(step);
}
function stopFly(){flying=false;if(raf)cancelAnimationFrame(raf);raf=null;
  map.setTerrain({source:'dem',exaggeration:curExa()});
  setRoute(false);setBtns();document.getElementById('bar').style.width='0';}
// embedded ground elevation (m) interpolated along the route at progress p
function gnd(p){var n=ELE.length; if(!n)return 3300; var f=p*(n-1),i=Math.min(Math.floor(f),n-2),t=f-i; return ELE[i]+(ELE[i+1]-ELE[i])*t;}
// live rendered-terrain elevation; null until tiles load
function liveG(ll){var e=map.queryTerrainElevation(new maplibregl.LngLat(ll[0],ll[1]),{exaggerated:true});return (e==null||isNaN(e))?null:e;}
function frameAt(pe){
  // real 3D camera behind+above the hiker, aimed at the trail just ahead — altitude from embedded DEM,
  // clamped up to live terrain so the camera can never sink below the ground.
  const walk=mode==='walk';
  const behind=walk?0.0006:0.03, ahead=walk?0.012:0.05;
  const cp=Math.max(0,pe-behind), tp=Math.min(1,pe+ahead);
  const cLL=along(CO,CD,cp), tLL=along(CO,CD,tp);
  let cg=gnd(cp), camAlt, tgtAlt;
  if(walk){
    const lc=liveG(cLL); if(lc!=null)cg=Math.max(cg,lc); // never sink below the rendered ground
    camAlt=cg+7; tgtAlt=camAlt-3;       // eye height, look gently forward (steady regardless of grade)
  }else{
    camAlt=cg+205; tgtAlt=gnd(tp)+12;   // aerial chase looks down at the trail ahead
  }
  map.jumpTo(map.calculateCameraOptionsFromTo(
    new maplibregl.LngLat(cLL[0],cLL[1]), camAlt,
    new maplibregl.LngLat(tLL[0],tLL[1]), tgtAlt));
}
function step(ts){
  if(!t0)t0=ts;
  let p=Math.min(1,(ts-t0)/dur), pe=easeIO(p);
  frameAt(pe);
  document.getElementById('bar').style.width=(p*100)+'%';
  if(p<1&&flying){raf=requestAnimationFrame(step);} else {stopFly();}
}

function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=Object.keys(HIKES).map(k=>'<button class="tab" data-k="'+k+'">'+HIKES[k].title+'</button>').join('');
  t.querySelectorAll('.tab').forEach(b=>b.onclick=()=>loadHike(b.dataset.k,true));
}
document.getElementById('play').onclick=()=>{(flying&&mode==='fly')?stopFly():startFly('fly');};
document.getElementById('walk').onclick=()=>{(flying&&mode==='walk')?stopFly():startFly('walk');};
document.getElementById('reset').onclick=()=>{stopFly();resetView();};
document.getElementById('exa').oninput=function(){document.getElementById('exav').textContent=(+this.value).toFixed(1);
  map.setTerrain({source:'dem',exaggeration:flying?Math.min(+this.value,1.0):+this.value});};
map.on('dragstart',()=>{if(flying)stopFly();});
</script>
</body>
</html>
