  const ng=items.map(it=>({g:it.geo.toNonIndexed(),c:it.color}));
  let tot=0; ng.forEach(o=>tot+=o.g.attributes.position.count);
  const pos=new Float32Array(tot*3),nor=new Float32Array(tot*3),col=new Float32Array(tot*3);
  let o=0; ng.forEach(it=>{const n=it.g.attributes.position.count;
    pos.set(it.g.attributes.position.array,o*3); nor.set(it.g.attributes.normal.array,o*3);
    for(let i=0;i<n;i++){col[(o+i)*3]=it.c[0];col[(o+i)*3+1]=it.c[1];col[(o+i)*3+2]=it.c[2];}
    o+=n;});
  const G=new THREE.BufferGeometry();
  G.setAttribute('position',new THREE.BufferAttribute(pos,3));
  G.setAttribute('normal',new THREE.BufferAttribute(nor,3));
  G.setAttribute('color',new THREE.BufferAttribute(col,3)); return G;
}
function coniferGeo(){ // fuller fir: trunk + 7 jittered tiers, total height ~1
  const it=[]; const trunk=new THREE.CylinderGeometry(0.035,0.07,0.6,5); trunk.translate(0,0.30,0);
  it.push({geo:trunk,color:[0.26,0.19,0.12]});
  for(let i=0;i<7;i++){const f=i/6, r=0.46*(1-f*0.8)+0.05, h=0.30*(1-f*0.2), y=0.32+f*0.60;
    const c=new THREE.ConeGeometry(r,h,7); c.rotateY(i*1.3); c.translate(Math.sin(i*2.1)*0.05,y,Math.cos(i*1.6)*0.05);
    const g=0.5+0.5*Math.sin(i*1.7); it.push({geo:c,color:[0.06+g*0.10,0.17+g*0.16,0.08+g*0.07]});}
  return mergeGeoC(it);
}
function broadGeo(){ // leafy broadleaf: trunk + clustered blobs
  const it=[]; const trunk=new THREE.CylinderGeometry(0.05,0.11,0.6,6); trunk.translate(0,0.30,0);
  it.push({geo:trunk,color:[0.30,0.22,0.14]});
  for(let i=0;i<7;i++){const a=i/7*6.28, rr=0.14+0.14*((i*7)%3)/2, r=0.30+0.15*((i*5)%3)/2;
    const b=new THREE.IcosahedronGeometry(r,0); b.translate(Math.cos(a)*rr,0.78+((i%3)-1)*0.13,Math.sin(a)*rr);
    const g=0.5+0.5*Math.sin(i*2.3); it.push({geo:b,color:[0.10+g*0.10,0.24+g*0.16,0.10+g*0.08]});}
  return mergeGeoC(it);
}
function addTrees(){
  const rnd=mulberry(1337), CAND=60000;
  const matC=new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,flatShading:true});
  const matB=new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,flatShading:true});
  const gC=coniferGeo(), gB=broadGeo();
  const conif=[], broad=[];
  for(let n=0;n<CAND;n++){
    const x=-W/2+rnd()*W, z=-Dp/2+rnd()*Dp, y=H(x,z);
    if(y>3560) continue;
    const hx=H(x+3,z)-H(x-3,z), hz=H(x,z+3)-H(x,z-3), slope=Math.hypot(hx,hz)/6;
    if(slope>0.78) continue;
    const dens=clamp01(1.04-(y-3150)/560);
    if(rnd()>dens) continue;
    const broadleaf=(y<3380 && rnd()<0.4);
    (broadleaf?broad:conif).push([x,y,z, (broadleaf?6+rnd()*8:7+rnd()*13), 0.85+rnd()*0.4, rnd()*6.28, rnd()]);
  }
  function build(geo,mat,list,spread){
    const im=new THREE.InstancedMesh(geo,mat,list.length); im.castShadow=true; im.receiveShadow=true;
    const m=new THREE.Matrix4(),q=new THREE.Quaternion(),s=new THREE.Vector3(),p=new THREE.Vector3(),col=new THREE.Color();
    for(let n=0;n<list.length;n++){const[x,y,z,h,w,ry,cv2]=list[n];
      q.setFromEuler(new THREE.Euler(0,ry,0)); p.set(x,y,z); s.set(h*spread*w,h,h*spread*w); m.compose(p,q,s); im.setMatrixAt(n,m);
      const v=0.82+0.34*cv2; col.setRGB(v,v,v); im.setColorAt(n,col);}
    im.instanceColor.needsUpdate=true; scene.add(im); return list.length;
  }
  return build(gC,matC,conif,0.24)+build(gB,matB,broad,0.42);
}
const treeCount=addTrees();
function addRocks(){
  const rnd=mulberry(99), G=new THREE.IcosahedronGeometry(1,0);
  const M=new THREE.MeshStandardMaterial({roughness:1,flatShading:true});
  const list=[];
  for(let n=0;n<14000;n++){
    const x=-W/2+rnd()*W, z=-Dp/2+rnd()*Dp, y=H(x,z);
    const hx=H(x+3,z)-H(x-3,z), hz=H(x,z+3)-H(x,z-3), slope=Math.hypot(hx,hz)/6;
    const pr=(y>3650?0.5:0.08)+(slope>0.5?0.45:0);
    if(rnd()>pr*0.5) continue;
    list.push([x,y,z, 0.4+rnd()*2.8, rnd()*6.28, rnd()*6.28, rnd()]);
  }
  const inst=new THREE.InstancedMesh(G,M,list.length); inst.castShadow=true; inst.receiveShadow=true;
  const m=new THREE.Matrix4(),q=new THREE.Quaternion(),s=new THREE.Vector3(),p=new THREE.Vector3(),col=new THREE.Color();
  for(let n=0;n<list.length;n++){const[x,y,z,sz,rx,ry,cv2]=list[n];
    q.setFromEuler(new THREE.Euler(rx,ry,rx*0.5)); p.set(x,y+sz*0.25,z); s.set(sz,sz*0.72,sz); m.compose(p,q,s); inst.setMatrixAt(n,m);
    const gg=0.42+0.22*cv2; col.setRGB(gg*1.06,gg,gg*0.9); inst.setColorAt(n,col);}
  inst.instanceColor.needsUpdate=true; scene.add(inst); return list.length;
}
addRocks();

// ---------- grass ground cover (camera-anchored, wind-animated) ----------
function grassTex(){
  const S=64,cv=document.createElement('canvas');cv.width=cv.height=S;const x=cv.getContext('2d');const r=mulberry(5);
  x.clearRect(0,0,S,S);
  for(let b=0;b<7;b++){const bx=6+r()*52,w=1.5+r()*2.2,h=34+r()*26,lean=(r()-0.5)*16;
    const g=x.createLinearGradient(0,S,0,S-h);g.addColorStop(0,'#33561e');g.addColorStop(1,'#88b557');
    x.fillStyle=g;x.beginPath();x.moveTo(bx-w,S);
    x.quadraticCurveTo(bx-w+lean,S-h*0.6,bx+lean,S-h);
    x.quadraticCurveTo(bx+w+lean,S-h*0.6,bx+w,S);x.closePath();x.fill();}
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;return t;
}
function clumpGeo(){
  const quads=3,pos=[],uvs=[],aH=[],idx=[];let vo=0;
  for(let q=0;q<quads;q++){const a=q/quads*Math.PI,dx=Math.cos(a)*0.5,dz=Math.sin(a)*0.5;
    pos.push(-dx,0,-dz, dx,0,dz, dx,1,dz, -dx,1,-dz);
    uvs.push(0,0,1,0,1,1,0,1); aH.push(0,0,1,1);
    idx.push(vo,vo+1,vo+2, vo,vo+2,vo+3); vo+=4;}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setAttribute('aH',new THREE.Float32BufferAttribute(aH,1));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}
const GR=34, GN=60000, grassOffs=[]; let grass=null, grassCell=null, grassTime=null;
function buildGrass(){
  const r=mulberry(7);
  for(let n=0;n<GN;n++){const rad=Math.sqrt(r())*GR,a=r()*6.28;
    grassOffs.push([Math.cos(a)*rad,Math.sin(a)*rad, 0.28+r()*0.26, r()*6.28, 0.34+r()*0.3]);}
  const mat=new THREE.MeshStandardMaterial({map:grassTex(),alphaTest:0.35,side:THREE.DoubleSide,roughness:1,color:0x7c9a4f});
  mat.onBeforeCompile=(sh)=>{sh.uniforms.uTime={value:0};grassTime=sh.uniforms.uTime;
    sh.vertexShader='attribute float aH;uniform float uTime;\n'+sh.vertexShader.replace('#include <begin_vertex>',
      '#include <begin_vertex>\n float wv=sin(uTime*1.5+(instanceMatrix[3].x+instanceMatrix[3].z)*0.35)*0.22*aH; transformed.x+=wv; transformed.z+=wv*0.5;');};
  grass=new THREE.InstancedMesh(clumpGeo(),mat,GN);
  grass.frustumCulled=false; grass.receiveShadow=true; grass.castShadow=false;
  scene.add(grass); placeGrass(true);
}
function placeGrass(force){
  const cx=Math.round(camera.position.x/3)*3, cz=Math.round(camera.position.z/3)*3;
  if(!force && grassCell && grassCell[0]===cx && grassCell[1]===cz) return;
  grassCell=[cx,cz];
  const m=new THREE.Matrix4(),q=new THREE.Quaternion(),s=new THREE.Vector3(),p=new THREE.Vector3();
  for(let n=0;n<GN;n++){const o=grassOffs[n];const x=cx+o[0],z=cz+o[1],y=H(x,z);
    q.setFromEuler(new THREE.Euler(0,o[3],0)); p.set(x,y,z);
    if(y>3600) s.set(0,0,0); else s.set(o[4],o[2],o[4]);
    m.compose(p,q,s); grass.setMatrixAt(n,m);}
  grass.instanceMatrix.needsUpdate=true;
}
buildGrass();

// ---------- water (lakes) ----------
const waterMeshes=[]; let waterNrm=null;
function addWater(){
  waterNrm=buildNormalTex(7);
  D.markers.forEach(m=>{
    if(!/lake|finish/.test(m.i) && !/Lake/.test(m.n)) return;
    const x=wx(m.lng), z=wz(m.lat), el=demAt(m.lng,m.lat);
    const r=/Upper/.test(m.n)?70:95;
    const w=new THREE.Mesh(new THREE.CircleGeometry(r,48),
      new THREE.MeshStandardMaterial({color:0x214a64,roughness:0.05,metalness:0.0,transparent:true,opacity:0.92,
        normalMap:waterNrm,normalScale:new THREE.Vector2(0.22,0.22)}));
    w.rotation.x=-Math.PI/2; w.position.set(x,el+1.0,z); w.receiveShadow=true;
    scene.add(w); waterMeshes.push(w);
  });
}
addWater();

// ---------- trail path ----------
const TP=D.trail.map(c=>{const x=wx(c[0]),z=wz(c[1]);return new THREE.Vector3(x,H(x,z)+0.6,z);});
const curve=new THREE.CatmullRomCurve3(TP);
(function(){
  const tube=new THREE.TubeGeometry(curve,400,1.5,8,false);
  const m=new THREE.MeshStandardMaterial({color:0xc7b27e,roughness:0.95});
  const mesh=new THREE.Mesh(tube,m); mesh.receiveShadow=true; scene.add(mesh);
})();
// total trail length & arc lookup
const TLEN=curve.getLength();

// ---------- marker labels ----------
const labels=D.markers.map(m=>{
  const el=document.createElement('div');el.className='lbl';el.textContent=m.n;
  document.getElementById('lbls').appendChild(el);
  const x=wx(m.lng),z=wz(m.lat);
  return {el,pos:new THREE.Vector3(x,demAt(m.lng,m.lat)+6,z)};
});

// ---------- controls ----------
let mode='auto', t=0; // auto progress 0..1
let yaw=0,pitch=-0.05, pos=new THREE.Vector3(), vel=new THREE.Vector3();
const keys={};
const EYE=1.7, SPD=7.5, RUN=22;
function startAuto(){mode='auto';document.getElementById('cross').style.display='none';
  document.getElementById('bAuto').classList.add('on');document.getElementById('bFree').classList.remove('on');
  if(document.pointerLockElement)document.exitPointerLock();}
function startFree(){mode='free';cvs.requestPointerLock&&cvs.requestPointerLock();
  document.getElementById('bAuto').classList.remove('on');document.getElementById('bFree').classList.add('on');}
document.getElementById('bAuto').onclick=startAuto;
document.getElementById('bFree').onclick=startFree;
document.getElementById('bReset').onclick=()=>{t=0;startAuto();};
addEventListener('pointerlockchange',()=>{document.getElementById('cross').style.display=document.pointerLockElement?'block':'none';});
addEventListener('mousemove',e=>{if(document.pointerLockElement){yaw-=e.movementX*0.0022;pitch-=e.movementY*0.0022;pitch=Math.max(-1.3,Math.min(1.3,pitch));}});
addEventListener('keydown',e=>{keys[e.code]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
// init at trailhead
(function(){const p0=curve.getPointAt(0);pos.set(p0.x,H(p0.x,p0.z)+EYE,p0.z);
  const p1=curve.getPointAt(0.01);yaw=Math.atan2(p1.x-p0.x,-(p1.z-p0.z));})();

function clampPos(){const lim=0.5;pos.x=Math.max(-W/2+lim,Math.min(W/2-lim,pos.x));pos.z=Math.max(-Dp/2+lim,Math.min(Dp/2-lim,pos.z));}

// ---------- loop ----------
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  if(window.__pause){last=now;return;}
  const dt=Math.min((now-last)/1000,0.05); last=now;
  if(waterNrm){waterNrm.offset.x+=dt*0.012; waterNrm.offset.y+=dt*0.008;}
  if(mode==='auto'){
    t+=dt*(SPD*0.55)/TLEN; if(t>=1){t=1;}
    const pc=curve.getPointAt(t), pa=curve.getPointAt(Math.min(1,t+0.004));
    pos.set(pc.x,H(pc.x,pc.z)+EYE,pc.z);
    yaw=Math.atan2(pa.x-pc.x,-(pa.z-pc.z)); pitch=-0.16;
    document.getElementById('prog').textContent='mile '+ (t*TLEN/1609).toFixed(2);
  } else {
    const sp=(keys['ShiftLeft']||keys['ShiftRight'])?RUN:SPD;
    const fwd=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
    const rt=new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));
    const mv=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])mv.add(fwd);
    if(keys['KeyS']||keys['ArrowDown'])mv.sub(fwd);
    if(keys['KeyD']||keys['ArrowRight'])mv.add(rt);
    if(keys['KeyA']||keys['ArrowLeft'])mv.sub(rt);
    if(mv.lengthSq()>0){mv.normalize().multiplyScalar(sp*dt);pos.x+=mv.x;pos.z+=mv.z;}
    clampPos();
    pos.y=H(pos.x,pos.z)+EYE;
  }
  // orient camera
  const dir=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),-Math.cos(yaw)*Math.cos(pitch));
  camera.position.copy(pos); camera.lookAt(pos.x+dir.x,pos.y+dir.y,pos.z+dir.z);
  SUN.target.position.copy(pos); SUN.position.copy(pos).add(new THREE.Vector3(-2200,2800,1800));
  sky.position.copy(camera.position);
  if(grassTime)grassTime.value=now*0.001; placeGrass(false);
  // hud
  document.getElementById('elev').textContent=Math.round((pos.y-EYE)*FT).toLocaleString();
  // labels
  labels.forEach(l=>{
    const v=l.pos.clone().project(camera);
    if(v.z>1||v.x<-1.1||v.x>1.1||v.y<-1.1||v.y>1.1){l.el.style.display='none';return;}
    l.el.style.display='block';
    l.el.style.left=((v.x*0.5+0.5)*innerWidth)+'px';
    l.el.style.top=((-v.y*0.5+0.5)*innerHeight)+'px';
  });
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
try{renderer.compile(scene,camera);}catch(e){} // warm up shaders so the first frame isn't black
document.getElementById('load').style.display='none';
requestAnimationFrame(frame);
window.__scene={scene,camera,renderer,treeCount,placeGrass,setT:function(t){if(grassTime)grassTime.value=t;}}; // debug handle
})();
</script>
</body>
